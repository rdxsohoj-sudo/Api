<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Number Info API - @RDXallhacknew</title>
</head>
<body>
    <pre id="json-output">Loading API Core System...</pre>

    <script>
        // Developer Credit: @RDXallhacknew
        const urlParams = new URLSearchParams(window.location.search);
        const mobile = urlParams.get('mobile');
        const outputElement = document.getElementById('json-output');

        if (!mobile) {
            const errorResponse = {
                "status": "error",
                "error_code": 400,
                "message": "Please enter a valid mobile number in the URL parameter. Example: ?mobile=6204458125",
                "developer_credits": {
                    "owner": "@RDXallhacknew",
                    "branding": "RDX SHADOW AUTOMATION"
                }
            };
            outputElement.textContent = JSON.stringify(errorResponse, null, 4);
        } else {
            // Target API URL
            const targetUrl = `https://number-aadvance-info-noobster.com-dashbord63hh7qe4.workers.dev/?key=demo&mobile=${encodeURIComponent(mobile)}`;
            
            // CORS Bypass Proxy Gateway URL
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            fetch(proxyUrl)
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('Network response was not ok.');
                })
                .then(proxyData => {
                    // সোর্স থেকে আসা র ডেটা
                    let rawContent = proxyData.contents;
                    
                    // 🚫 সোর্স এপিআই-এর ভেতরের সমস্ত টেলিগ্রাম লিংক এবং ক্রেডিট রিমুভ করার জাদুকরী ফিল্টার
                    rawContent = rawContent.replace(/https:\/\/t\.me\/[a-zA-Z0-9_]+/g, "[REMOVED]");
                    rawContent = rawContent.replace(/@noob11001/gi, "");
                    rawContent = rawContent.replace(/noobster/gi, "");

                    // ফিল্টার করা ডেটাকে JSON এ রূপান্তর
                    let realData;
                    try {
                        realData = JSON.parse(rawContent);
                    } catch(e) {
                        realData = {"info": rawContent};
                    }
                    
                    // আপনার নিজস্ব ব্র্যান্ডিং সহ ফাইনাল আউটপুট
                    const finalOutput = {
                        "api_status": "success",
                        "developer_info": {
                            "developer": "@RDXallhacknew",
                            "branding": "RDX SHADOW AUTOMATION",
                            "authorized": true,
                            "rights": "All Rights Reserved to @RDXallhacknew"
                        },
                        "search_parameters": {
                            "query_mobile": mobile
                        },
                        "real_information": realData
                    };
                    outputElement.textContent = JSON.stringify(finalOutput, null, 4);
                })
                .catch(error => {
                    const failedOutput = {
                        "api_status": "failed",
                        "developer": "@RDXallhacknew",
                        "message": "Unable to fetch data from the secure gateway. Please try again.",
                        "error_details": error.message
                    };
                    outputElement.textContent = JSON.stringify(failedOutput, null, 4);
                });
        }
    </script>
</body>
</html>
