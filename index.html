<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Core Gateway - @RDXallhacknew</title>
</head>
<body>
    <pre id="json-output">Initializing Core System by @RDXallhacknew...</pre>

    <script>
        // Developer Credit: @RDXallhacknew
        const urlParams = new URLSearchParams(window.location.search);
        const mobile = urlParams.get('mobile');
        const outputElement = document.getElementById('json-output');

        if (!mobile) {
            outputElement.textContent = JSON.stringify({
                "status": "error",
                "message": "Please enter a mobile number. Example: ?mobile=6204458125",
                "developer": "@RDXallhacknew"
            }, null, 4);
        } else {
            const targetUrl = `https://number-aadvance-info-noobster.com-dashbord63hh7qe4.workers.dev/?key=demo&mobile=${encodeURIComponent(mobile)}`;
            
            // Backup Proxy Network (CORS Bypass Engine)
            const proxy1 = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            const proxy2 = `https://cors-anywhere.herokuapp.com/${targetUrl}`;

            // ডেটা ফিল্টারিং এবং প্রিন্ট করার মেইন ফাংশন
            function processResponse(rawContent) {
                // 🚫 সোর্সের সমস্ত ক্রেডিট ও লিংক ভ্যানিশ করার ফিল্টার
                rawContent = rawContent.replace(/https:\/\/t\.me\/[a-zA-Z0-9_]+/gi, "");
                rawContent = rawContent.replace(/t\.me\/[a-zA-Z0-9_]+/gi, "");
                rawContent = rawContent.replace(/@noob11001/gi, "");
                rawContent = rawContent.replace(/noob11001/gi, "");
                rawContent = rawContent.replace(/noobster/gi, "");
                rawContent = rawContent.replace(/Noobster/gi, "");

                let cleanedData;
                try {
                    cleanedData = JSON.parse(rawContent);
                    const deepClean = (obj) => {
                        for (let key in obj) {
                            if (typeof obj[key] === 'string') {
                                obj[key] = obj[key].replace(/@noob11001|noob11001|noobster|t\.me\/[a-zA-Z0-9_]+/gi, "").trim();
                            } else if (typeof obj[key] === 'object' && obj[key] !== null) {
                                deepClean(obj[key]);
                            }
                        }
                    };
                    deepClean(cleanedData);
                } catch(e) {
                    cleanedData = { "info": rawContent.trim() };
                }

                // 👑 শুধুমাত্র আপনার ক্রেডিটসহ ফাইনাল আউটপুট
                const finalOutput = {
                    "status": "success",
                    "developer": "@RDXallhacknew",
                    "branding": "RDX SHADOW AUTOMATION SYSTEMS",
                    "search_result": cleanedData
                };
                outputElement.textContent = JSON.stringify(finalOutput, null, 4);
            }

            // প্রথম প্রক্সি দিয়ে চেষ্টা
            fetch(proxy1)
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(data => {
                    if(data && data.contents) {
                        processResponse(data.contents);
                    } else {
                        throw new Error();
                    }
                })
                .catch(() => {
                    // প্রথম প্রক্সি ফেইল করলে ব্যাকআপ প্রক্সি ট্রাই করবে
                    fetch(targetUrl, { method: 'GET', mode: 'cors' })
                        .then(res => res.text())
                        .then(text => processResponse(text))
                        .catch(err => {
                            outputElement.textContent = JSON.stringify({
                                "status": "failed",
                                "developer": "@RDXallhacknew",
                                "message": "Network bypass failed. Please refresh or check connection.",
                                "error_log": err.message
                            }, null, 4);
                        });
                });
        }
    </script>
</body>
</html>
