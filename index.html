<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Core Gateway - @RDXallhacknew</title>
</head>
<body>
    <pre id="json-output">Initializing Core System...</pre>

    <script>
        // Developer Credit: @RDXallhacknew
        const urlParams = new URLSearchParams(window.location.search);
        const mobile = urlParams.get('mobile');
        const outputElement = document.getElementById('json-output');

        if (!mobile) {
            const errorResponse = {
                "status": "error",
                "message": "Please enter a mobile number. Example: ?mobile=6204458125",
                "developer": "@RDXallhacknew"
            };
            outputElement.textContent = JSON.stringify(errorResponse, null, 4);
        } else {
            const targetUrl = `https://number-aadvance-info-noobster.com-dashbord63hh7qe4.workers.dev/?key=demo&mobile=${encodeURIComponent(mobile)}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            fetch(proxyUrl)
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('Gateway Connection Failed');
                })
                .then(proxyData => {
                    let rawContent = proxyData.contents;

                    // 🚫 ১০০% গ্যারান্টিড ফিল্টার: সোর্সের সমস্ত ক্রেডিট ও লিংক মুছে ফেলার ম্যাজিক
                    // ১. সমস্ত টেলিগ্রাম লিংক (t.me/...) সম্পূর্ণ মুছে ফেলা হচ্ছে
                    rawContent = rawContent.replace(/https:\/\/t\.me\/[a-zA-Z0-9_]+/gi, "");
                    rawContent = rawContent.replace(/t\.me\/[a-zA-Z0-9_]+/gi, "");
                    
                    // ২. সোর্স ডেভেলপারের ইউজারনেম এবং ব্র্যান্ড নাম সম্পূর্ণ ভ্যানিশ
                    rawContent = rawContent.replace(/@noob11001/gi, "");
                    rawContent = rawContent.replace(/noob11001/gi, "");
                    rawContent = rawContent.replace(/noobster/gi, "");
                    rawContent = rawContent.replace(/Noobster/gi, "");
                    
                    // ৩. কোনো অবশিষ্টাংশ বা ভাঙা লিংক থাকলে তাও পরিষ্কার করা
                    rawContent = rawContent.replace(/https?:\/\/[^\s]+telegram[^\s]+/gi, "");

                    // ফিল্টার করা ডেটাকে পরিষ্কার JSON অবজেক্টে রূপান্তর
                    let cleanedData;
                    try {
                        cleanedData = JSON.parse(rawContent);
                        
                        // যদি JSON-এর ভেতরের কী (Key) বা ভ্যালুতেও ওদের নাম থাকে, তা ডিলিট করার ফাংশন
                        const deepClean = (obj) => {
                            for (let key in obj) {
                                if (typeof obj[key] === 'string') {
                                    obj[key] = obj[key].replace(/@noob11001|noob11001|noobster|t\.me\/[a-zA-Z0-9_]+/gi, "").trim();
                                } else if (typeof obj[key] === 'object' && obj[key] !== null) {
                                    deepClean(obj[key]);
                                }
                            }
                        };
                        deepClean(cleanedData);
                    } catch(e) {
                        cleanedData = { "data": rawContent.trim() };
                    }

                    // 👑 শুধুমাত্র আপনার ক্রেডিটসহ ফাইনাল ১০০% পিওর আউটপুট
                    const finalOutput = {
                        "status": "success",
                        "developer": "@RDXallhacknew",
                        "branding": "RDX SHADOW AUTOMATION SYSTEMS",
                        "search_result": cleanedData
                    };

                    outputElement.textContent = JSON.stringify(finalOutput, null, 4);
                })
                .catch(error => {
                    const failedOutput = {
                        "status": "failed",
                        "developer": "@RDXallhacknew",
                        "message": "Security firewall blocked the request or source offline.",
                        "error_log": error.message
                    };
                    outputElement.textContent = JSON.stringify(failedOutput, null, 4);
                });
        }
    </script>
</body>
</html>
